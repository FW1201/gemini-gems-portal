<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 Gemini Gems 入口</title>
  <style>
    :root {
      --bg: #eef2ff;
      --surface: #ffffff;
      --surface2: #f1f5ff;
      --border: #dde5f8;
      --blue: #2563eb;
      --blue-light: #3b82f6;
      --blue-pale: #dbeafe;
      --text: #1e293b;
      --muted: #64748b;
      --shadow: rgba(37,99,235,0.10);
      --shadow-hover: rgba(37,99,235,0.20);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ─────────────────────────────────── */
    header {
      position: relative;
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
      padding: 56px 24px 48px;
      text-align: center;
      overflow: hidden;
    }
    /* floating orbs */
    header::before, header::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
      animation: float 6s ease-in-out infinite;
    }
    header::before {
      width: 300px; height: 300px;
      background: #93c5fd;
      top: -80px; left: -60px;
      animation-delay: 0s;
    }
    header::after {
      width: 200px; height: 200px;
      background: #bfdbfe;
      bottom: -60px; right: -40px;
      animation-delay: -3s;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50%       { transform: translateY(-18px) scale(1.04); }
    }
    .header-inner { position: relative; z-index: 1; }
    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.78rem;
      color: #bfdbfe;
      margin-bottom: 14px;
      backdrop-filter: blur(6px);
      letter-spacing: 0.04em;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }
    header h1 span {
      background: linear-gradient(90deg, #93c5fd, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: #bfdbfe;
      font-size: 1rem;
    }

    /* wave divider */
    .wave {
      display: block;
      width: 100%;
      height: 40px;
      background: var(--bg);
      clip-path: ellipse(55% 100% at 50% 100%);
      margin-top: -1px;
    }

    /* ── CONTROLS ────────────────────────────────── */
    .controls {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 8px;
    }
    .search-wrap {
      position: relative;
      margin-bottom: 18px;
    }
    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 14px 18px 14px 48px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
    }
    #searchInput:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1), 0 2px 8px var(--shadow);
    }
    #searchInput::placeholder { color: #a0aec0; }

    /* category pills */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .filter-label {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
      margin-right: 2px;
    }
    .cat-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 16px;
      border-radius: 24px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .cat-btn:hover {
      border-color: var(--blue-light);
      color: var(--blue);
      background: var(--blue-pale);
      transform: translateY(-1px);
    }
    .cat-btn.active {
      color: #fff;
      border-color: transparent;
      box-shadow: 0 3px 10px var(--shadow-hover);
      transform: translateY(-1px);
    }
    /* per-category active colours */
    .cat-btn[data-cat="all"].active    { background: var(--blue); }
    .cat-btn[data-cat="繪圖"].active    { background: #db2777; }
    .cat-btn[data-cat="教學"].active    { background: #059669; }
    .cat-btn[data-cat="行政"].active    { background: #d97706; }
    .cat-btn[data-cat="趣味"].active    { background: #ea580c; }
    .cat-btn[data-cat="簡報"].active    { background: #7c3aed; }
    .cat-btn[data-cat="學術"].active    { background: #0284c7; }
    .cat-btn[data-cat="AI工具"].active  { background: #4f46e5; }

    /* ── STATS ───────────────────────────────────── */
    .stats {
      max-width: 1100px;
      margin: 14px auto 0;
      padding: 0 20px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* ── GRID ────────────────────────────────────── */
    .grid {
      max-width: 1100px;
      margin: 16px auto 48px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    /* ── CARD ────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 18px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1),
                  box-shadow 0.22s ease,
                  border-color 0.22s ease;
      box-shadow: 0 2px 10px var(--shadow);
      opacity: 0;
      transform: translateY(20px);
      animation: cardIn 0.4s ease forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 12px 32px var(--shadow-hover);
      border-color: var(--blue-light);
    }
    .card.hidden { display: none; }

    .card-top { display: flex; align-items: flex-start; gap: 14px; }
    .card-icon {
      font-size: 1.7rem;
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      background: var(--blue-pale);
      border-radius: 13px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .card:hover .card-icon { transform: scale(1.1) rotate(-4deg); }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 700;
      font-size: 1rem;
      line-height: 1.4;
      color: var(--text);
    }
    /* category badge on card */
    .card-cat-badge {
      display: inline-flex;
      align-items: center;
      margin-top: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 10px;
      letter-spacing: 0.02em;
    }
    .badge-繪圖  { background: #fce7f3; color: #be185d; }
    .badge-教學  { background: #d1fae5; color: #065f46; }
    .badge-行政  { background: #fef3c7; color: #92400e; }
    .badge-趣味  { background: #ffedd5; color: #9a3412; }
    .badge-簡報  { background: #ede9fe; color: #5b21b6; }
    .badge-學術  { background: #e0f2fe; color: #0c4a6e; }
    .badge-AI工具 { background: #e0e7ff; color: #3730a3; }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-size: 0.86rem;
      font-weight: 600;
      transition: all 0.18s;
      align-self: flex-start;
      margin-top: auto;
      box-shadow: 0 3px 10px rgba(37,99,235,0.25);
    }
    .card-link:hover {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      box-shadow: 0 5px 16px rgba(37,99,235,0.4);
      transform: translateX(2px);
    }

    /* ── EMPTY ───────────────────────────────────── */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 64px 0;
      color: var(--muted);
    }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.4; }

    /* ── FOOTER ──────────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    footer a { color: var(--blue); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-badge">✦ Gemini Gems &nbsp;·&nbsp; 22 個工具</div>
    <h1>我的 <span>Gems</span> 工具入口</h1>
    <p>依用途分類，快速找到你需要的 AI 助手</p>
  </div>
</header>
<span class="wave"></span>

<div class="controls">
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="text" placeholder="搜尋工具名稱…">
  </div>
  <div class="filter-bar">
    <span class="filter-label">分類</span>
    <button class="cat-btn active" data-cat="all">🔷 全部</button>
    <button class="cat-btn" data-cat="繪圖">🎨 繪圖</button>
    <button class="cat-btn" data-cat="教學">📚 教學</button>
    <button class="cat-btn" data-cat="簡報">📊 簡報</button>
    <button class="cat-btn" data-cat="學術">🔬 學術</button>
    <button class="cat-btn" data-cat="行政">🏛️ 行政</button>
    <button class="cat-btn" data-cat="趣味">🎉 趣味</button>
    <button class="cat-btn" data-cat="AI工具">🤖 AI工具</button>
  </div>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<footer>
  共 22 個 Gemini Gems &nbsp;·&nbsp; 點擊「開啟」直接進入工具
</footer>

<script>
const gems = [
  { name:"手語教學圖卡",          icon:"🤟", cat:"教學",  url:"https://gemini.google.com/gem/1tPlNSSgJ23OahVo_0aOVO7vMsDlqJWVj?usp=sharing" },
  { name:"學術論文筆記幫手",       icon:"📚", cat:"學術",  url:"https://gemini.google.com/gem/1HGAsmR5gyxKI5b86R9DUClbpW5-1KfRl?usp=sharing" },
  { name:"3D程式模型圖製作",       icon:"🧊", cat:"趣味",  url:"https://gemini.google.com/gem/10AVIpU7dsMZerAYpegS_w9Jdro9AdR-q?usp=sharing" },
  { name:"YAML資訊圖表指令大師",   icon:"📊", cat:"簡報",  url:"https://gemini.google.com/gem/1912ddlcEf9q-wtCJ4G8QLjaVC2Hfxtl_?usp=sharing" },
  { name:"YAML簡報指令大師",       icon:"🎞️", cat:"簡報",  url:"https://gemini.google.com/gem/1Ezp6J75u0IrNQgxmzLZsRaOiNHdcsskx?usp=sharing" },
  { name:"狂想音樂創作家",         icon:"🎵", cat:"趣味",  url:"https://gemini.google.com/gem/1UMJ5WiUzjSIlBm80ADnyC7gK3PFxTlrj?usp=sharing" },
  { name:"Opal Gems提示詞架構師",  icon:"💎", cat:"AI工具",url:"https://gemini.google.com/gem/1Ia7UDXHaS7SbkjNuU02u-a1LqF8JFnQH?usp=sharing" },
  { name:"情人節圖卡繪師",         icon:"💝", cat:"繪圖",  url:"https://gemini.google.com/gem/1S7FM5LjXm4e69S2wYx65CVE5ahBrd40S?usp=sharing" },
  { name:"素養試題配圖繪師",       icon:"🖼️", cat:"繪圖",  url:"https://gemini.google.com/gem/1S7FM5LjXm4e69S2wYx65CVE5ahBrd40S?usp=sharing" },
  { name:"素養試題設計專家團隊",   icon:"📝", cat:"教學",  url:"https://gemini.google.com/gem/1Dw0XVHLVkDPVs7-tUicmBzU-5tP-rEUP?usp=sharing" },
  { name:"學術用圖快樂繪師",       icon:"🎨", cat:"繪圖",  url:"https://gemini.google.com/gem/1VsWUL5qIdszLEWxGfTELDBxHEoSD2Bcj?usp=sharing" },
  { name:"DOK學習單設計專家",      icon:"📋", cat:"教學",  url:"https://gemini.google.com/gem/1XyrMeJeMy7MSWP_NMx0bgJyO3on9yWGO?usp=sharing" },
  { name:"海報/資訊圖卡設計師",    icon:"🗂️", cat:"繪圖",  url:"https://gemini.google.com/gem/15yRFwHA0vLzrsiu57USdmcz4HQfdctJZ?usp=sharing" },
  { name:"數位精進採購小顧問",     icon:"🛒", cat:"行政",  url:"https://gemini.google.com/gem/1qKIiprEPQmln6WkFfLmhaurRfaiVJhdY?usp=sharing" },
  { name:"教學用漫畫專家",         icon:"💬", cat:"繪圖",  url:"https://gemini.google.com/gem/1jf5AoQg2hSmevQqLurP-9rPqWyBoXCjg?usp=sharing" },
  { name:"Google Slides教育簡報專家",icon:"📑",cat:"簡報",  url:"https://gemini.google.com/gem/15jKCA1snnh2dAljoP7D0FkULXU73kfjZ?usp=sharing" },
  { name:"Gemini Gems提示詞設計師",icon:"⚙️", cat:"AI工具",url:"https://gemini.google.com/gem/1jZyJUz8pihNMxNpzdylYt5NSQN4o7yed?usp=sharing" },
  { name:"圖解力筆記設計師",       icon:"🗒️", cat:"學術",  url:"https://gemini.google.com/gem/1l77qEKaFbAFbvBwgbB04LyVlvpNHsctO?usp=sharing" },
  { name:"黑白學習單大師",         icon:"📄", cat:"教學",  url:"https://gemini.google.com/gem/1F-ekj1bpo2tHWJkxCmiBBRTcSvZelQ7c?usp=sharing" },
  { name:"公文草擬大師",           icon:"📜", cat:"行政",  url:"https://gemini.google.com/gem/1KETnUC9TAjQ4Edu2cB3DG22N0PoxguHL?usp=sharing" },
  { name:"素養導向教案設計師",     icon:"🏫", cat:"教學",  url:"https://gemini.google.com/gem/1VydJloOuzZc29o1IdVlWHe_U_KaNsSwu?usp=sharing" },
  { name:"提示詞優化專家",         icon:"🔧", cat:"AI工具",url:"https://gemini.google.com/gem/1n2ffavcC-qe4THgonxV4nNAdH8i5Ova4?usp=sharing" },
];

const grid = document.getElementById('grid');
let activeCategory = 'all';
let searchQuery = '';

function renderCards() {
  grid.innerHTML = '';
  let visible = 0;

  gems.forEach((gem, i) => {
    const matchCat = activeCategory === 'all' || gem.cat === activeCategory;
    const matchSearch = !searchQuery || gem.name.toLowerCase().includes(searchQuery) || gem.cat.toLowerCase().includes(searchQuery);
    if (!matchCat || !matchSearch) return;
    visible++;

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${(visible - 1) * 45}ms`;
    card.innerHTML = `
      <div class="card-top">
        <div class="card-icon">${gem.icon}</div>
        <div class="card-info">
          <div class="card-name">${gem.name}</div>
          <span class="card-cat-badge badge-${gem.cat}">${gem.cat}</span>
        </div>
      </div>
      <a class="card-link" href="${gem.url}" target="_blank" rel="noopener">
        開啟工具
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </a>
    `;
    grid.appendChild(card);
  });

  if (visible === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>找不到符合的工具</div>`;
  }

  document.getElementById('stats').textContent = `顯示 ${visible} / ${gems.length} 個工具`;
}

// Category filter
document.querySelector('.filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeCategory = btn.dataset.cat;
  renderCards();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderCards();
});

renderCards();
</script>
</body>
</html>
