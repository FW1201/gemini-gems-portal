<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的 Gemini Gems 入口</title>
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: #2e2e3e;
      --accent: #7c6af7;
      --accent2: #5bbfff;
      --text: #e8e8f0;
      --muted: #8888aa;
      --tag-bg: #2a2a3a;
      --tag-active: #7c6af7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #1a1030 0%, #0d1a2e 100%);
      border-bottom: 1px solid var(--border);
      padding: 32px 24px 24px;
      text-align: center;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    header p { color: var(--muted); font-size: 0.95rem; }

    /* Controls */
    .controls {
      max-width: 1100px;
      margin: 24px auto 0;
      padding: 0 20px;
    }
    .search-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #searchInput:focus { border-color: var(--accent); }
    #searchInput::placeholder { color: var(--muted); }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .filter-label { color: var(--muted); font-size: 0.82rem; margin-right: 4px; }
    .tag-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--tag-bg);
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .tag-btn:hover { border-color: var(--accent); color: var(--text); }
    .tag-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .tag-btn.all.active { background: var(--accent2); border-color: var(--accent2); }

    /* Stats */
    .stats {
      max-width: 1100px;
      margin: 12px auto 0;
      padding: 0 20px;
      color: var(--muted);
      font-size: 0.83rem;
    }

    /* Grid */
    .grid {
      max-width: 1100px;
      margin: 16px auto 40px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,106,247,0.15);
    }
    .card.hidden { display: none; }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .card-icon {
      font-size: 1.8rem;
      line-height: 1;
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      border-radius: 10px;
    }
    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 600;
      font-size: 0.97rem;
      line-height: 1.4;
      color: var(--text);
    }
    .card-category {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .card-tag {
      font-size: 0.72rem;
      padding: 3px 9px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: linear-gradient(135deg, var(--accent), #9c8aff);
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: opacity 0.18s, transform 0.12s;
      align-self: flex-start;
      margin-top: auto;
    }
    .card-link:hover { opacity: 0.88; transform: scale(1.02); }

    /* Empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
    }
    .empty svg { margin-bottom: 12px; opacity: 0.4; }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>

  }
];

// Collect all unique tags
const allTags = [...new Set(gems.flatMap(g => g.tags))].sort();

// Build filter buttons
const filterBar = document.querySelector('.filter-bar');
allTags.forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'tag-btn';
  btn.dataset.tag = tag;
  btn.textContent = tag;
  filterBar.appendChild(btn);
});

// Render cards
const grid = document.getElementById('grid');
gems.forEach((gem, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.tags = gem.tags.join(' ').toLowerCase();
  card.dataset.name = gem.name.toLowerCase();
  card.innerHTML = `
    <div class="card-top">
      <div class="card-icon">${gem.icon}</div>
      <div class="card-info">
        <div class="card-name">${gem.name}</div>
        <div class="card-category">${gem.category}</div>
      </div>
    </div>
    <div class="card-tags">
      ${gem.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
    </div>
    <a class="card-link" href="${gem.url}" target="_blank" rel="noopener">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      開啟 Gem
    </a>
  `;
  grid.appendChild(card);
});

// Filter logic
let activeTag = 'all';
let searchQuery = '';

function updateCards() {
  const cards = grid.querySelectorAll('.card');
  let visible = 0;
  cards.forEach(card => {
    const matchTag = activeTag === 'all' || card.dataset.tags.split(' ').includes(activeTag.toLowerCase());
    const matchSearch = !searchQuery ||
      card.dataset.name.includes(searchQuery) ||
      card.dataset.tags.includes(searchQuery);
    if (matchTag && matchSearch) {
      card.classList.remove('hidden');
      visible++;
    } else {
      card.classList.add('hidden');
    }
  });

  // Empty state
  let empty = grid.querySelector('.empty');
  if (visible === 0) {
    if (!empty) {
      empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = `<svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><br>找不到符合的 Gem`;
      grid.appendChild(empty);
    }
  } else {
    if (empty) empty.remove();
  }

  document.getElementById('stats').textContent = `顯示 ${visible} / ${gems.length} 個 Gems`;
}

// Tag button clicks
filterBar.addEventListener('click', e => {
  const btn = e.target.closest('.tag-btn');
  if (!btn) return;
  filterBar.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeTag = btn.dataset.tag;
  updateCards();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  updateCards();
});

updateCards();
</script>
